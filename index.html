<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Title -->
    <title>CodeThrive Infotech | Final Year Projects & IT Training</title>

    <!-- ✅ Optimized Meta Description -->
    <meta
      name="description"
      content="We are CodeThrive Infotech, a team of developers, designers, and strategists offering Final Year Projects, IT Training, Internship Programs, and Software Development. Turn your ideas into digital reality."
    />

    <!-- Google Verification -->
    <meta
      name="google-site-verification"
      content="Vsod9kdO9UbWwiAp0-oxiT4OCbk60T59RgHu7Ri-_08"
    />

    <!-- ✅ Correct Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="https://codethriveinfotech.in/favicon.png"
    />
    <link
      rel="shortcut icon"
      href="https://codethriveinfotech.in/favicon.png"
    />

    <!-- Apple Icon -->
    <link
      rel="apple-touch-icon"
      href="https://codethriveinfotech.in/logo.png"
    />

    <!-- ✅ Open Graph (for social + Google) -->
    <meta property="og:title" content="CodeThrive Infotech" />
    <meta
      property="og:description"
      content="Final Year Projects, IT Training & Internship Programs with expert guidance."
    />
    <meta
      property="og:image"
      content="https://codethriveinfotech.in/logo.png"
    />
    <meta property="og:url" content="https://codethriveinfotech.in" />
    <meta property="og:type" content="website" />

    <!-- ✅ Organization Schema (for Google logo) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "CodeThrive Infotech",
        "url": "https://codethriveinfotech.in",
        "logo": "https://codethriveinfotech.in/logo.png"
      }
    </script>

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans&family=Inter&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>

    <!-- React App -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
